---
packages:
  - type: github_release
    repo_owner: timhartmann7
    repo_name: omnyssh
    asset: omny-{{.Arch}}-{{.OS}}.tar.gz
    format: tar.gz
    files:
      - name: omny
    replacements:
      amd64: x86_64
      arm64: aarch64
      darwin: apple-darwin
    overrides:
      - goos: linux
        goarch: amd64
        asset: omny-x86_64-unknown-linux-gnu.tar.gz
      - goos: linux
        goarch: arm64
        asset: omny-aarch64-unknown-linux-musl.tar.gz
